name: Render video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Render MP4
        run: npm run render

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video-final
          path: out/video.mp4
